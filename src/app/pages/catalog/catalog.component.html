<section class="collections-section">
  <div class="container py-5">
    <h1 class="text-center mb-4">{{ title }}</h1>

    <div class="row justify-content-center mb-4" *ngIf="searchValue">
      <div class="col-auto">
        <button class="btn btn-outline-secondary" (click)="clearSearch()">
          Сбросить поиск
        </button>
      </div>
    </div>

    <div *ngIf="isLoading" class="d-flex justify-content-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Загрузка...</span>
      </div>
    </div>

    <div *ngIf="!isLoading && teas.length === 0" class="text-center py-5">
      <p class="fs-4 mb-0">Ничего не найдено</p>
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4" *ngIf="!isLoading && teas.length > 0">
      <div class="col" *ngFor="let tea of teas">
        <div class="card h-100">
          <img [src]="tea.image" class="card-img-top" [alt]="tea.title">

          <div class="card-body d-flex flex-column">
            <h5 class="card-title">{{ tea.title }}</h5>
            <p class="card-text">{{ tea.description }}</p>

            <a [routerLink]="['/product', tea.id]" class="btn btn-primary mt-auto">
              Подробнее
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
