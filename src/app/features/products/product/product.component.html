<div class="container mt-5" *ngIf="tea; else loading">
  <div class="row">
    <div class="col-md-5 mb-4 mb-md-0">
      <img
        [src]="tea.image"
        [alt]="tea.title"
        class="img-fluid rounded shadow-sm"
      >
    </div>

    <div class="col-md-7">
      <h1 class="mb-3">{{ tea.title }}</h1>

      <h4 class="text-primary mb-3">
        Цена: {{ tea.price }} ₽
      </h4>

      <p class="mb-4">
        {{ tea.description }}
      </p>

      <button class="btn btn-primary btn-lg" (click)="onBuy()">
        Купить
      </button>
    </div>
  </div>
</div>

<ng-template #loading>
  <div class="container mt-5">
    Загрузка товара...
  </div>
</ng-template>
