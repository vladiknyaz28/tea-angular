<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <div class="container">
    <a class="navbar-brand" routerLink="/">Logo</a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#mainNav"
      aria-controls="mainNav"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" [routerLinkActiveOptions]="{ exact: true }" routerLinkActive="active">
            Главная
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/catalog" routerLinkActive="active">
            Каталог
          </a>
        </li>
      </ul>

      <form class="d-flex gap-2" (ngSubmit)="onSearch()">
        <input
          type="text"
          class="form-control"
          name="search"
          placeholder="Поиск чая"
          [(ngModel)]="searchValue"
        >

        <button class="btn btn-primary" type="submit">
          Найти
        </button>

        <button class="btn btn-outline-secondary" type="button" (click)="clearSearch()">
          Сброс
        </button>
      </form>
    </div>
  </div>
</nav>
